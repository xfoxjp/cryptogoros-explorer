<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoGoros Explorer</title>
    <style>
        :root { --goros-orange: #FF6600; --bg-color: #FFF5EE; }
        body { font-family: sans-serif; background: var(--bg-color); padding: 40px 20px; color: #333; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,102,0,0.1); }
        h1 { color: var(--goros-orange); text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px; border: 2px solid #FFE0C0; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--goros-orange); }
        button { padding: 12px 24px; background: var(--goros-orange); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #result { display: none; border-top: 2px solid #FFE0C0; padding-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 画像リンク */
        #nftLink { display: block; width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        #nftLink:hover { transform: scale(1.01); box-shadow: 0 8px 25px rgba(255,102,0,0.2); }
        .nft-img { width: 100%; display: block; }
        
        .info-group { margin-bottom: 20px; }
        .info-label { font-size: 12px; color: #CC5500; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .info-value { font-size: 16px; word-break: break-all; line-height: 1.5; }
        
        /* オーナーリンク */
        #nftOwnerLink { color: var(--goros-orange); text-decoration: underline; font-weight: bold; }
        #nftOwnerLink:hover { color: #cc5500; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>CryptoGoros</h1>
    <div class="search-box">
        <input type="number" id="tokenId" placeholder="IDを入力" value="1">
        <button id="fetchBtn">表示する</button>
    </div>

    <div id="result">
        <a id="nftLink" href="#" target="_blank">
            <img id="nftImage" class="nft-img" src="" alt="NFT">
        </a>

        <div class="info-group">
            <div class="info-label">Name</div>
            <div id="nftTitle" class="info-value" style="font-weight: bold; font-size: 20px;"></div>
        </div>

        <div class="info-group">
            <div class="info-label">Owner (Click to see their CryptoGoro collection)</div>
            <div class="info-value">
                <a id="nftOwnerLink" href="#" target="_blank"></a>
            </div>
        </div>

        <div class="info-group">
            <div class="info-label">Description</div>
            <div id="nftDescription" class="info-value" style="color: #555; font-size: 14px;"></div>
        </div>

        
        <div class="info-group">
    <div class="info-label">Traits</div>
    <div id="nftTraits" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; cursor: pointer;">
</div>

</div>
        <div class="info-group">
    <div class="info-label">Transfer History</div>
    <table id="historyTable" style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px;">
        <thead>
            <tr style="border-bottom: 2px solid #FFE0C0; text-align: left; color: #CC5500;">
                <th style="padding: 8px;">From</th>
                <th style="padding: 8px;">To</th>
                <th style="padding: 8px;">TX</th>
            </tr>
        </thead>
        <tbody id="hBody">
            </tbody>
    </table>
</div>
    </div>
</div>

<script>
// --- ⚠️ 設定: ここに自分のAPIキーを貼り付けてください ⚠️ ---
const API_KEY = "xsfAkUztgC2QOCiy0ElXe"; 
const CONTRACT = "0x6C621364993E5CD4C6468930d287ba76Ef64F366";

document.getElementById('fetchBtn').onclick = async function() {
    const tid = document.getElementById('tokenId').value;
    const btn = this;
    const resultDiv = document.getElementById('result');
    const hBody = document.getElementById('hBody');
    
    if (!tid) return;

    btn.disabled = true;
    btn.innerText = "取得中...";
    resultDiv.style.display = 'none';
    hBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:10px;'>スキャン中...</td></tr>";

    try {
        // --- 1. メタデータ（画像・名前・説明）を取得 ---
        const nftUrl = `https://polygon-mainnet.g.alchemy.com/nft/v3/${API_KEY}/getNFTMetadata?contractAddress=${CONTRACT}&tokenId=${tid}&refreshCache=true`;
        const nftRes = await fetch(nftUrl);
        const data = await nftRes.json();

        let imgUrl = (data.raw && data.raw.metadata) ? (data.raw.metadata.Image || data.raw.metadata.image) : (data.image?.rawUrl || "");
        if (imgUrl.startsWith("ipfs://")) imgUrl = imgUrl.replace("ipfs://", "https://nftstorage.link/ipfs/").replace("ipfs/ipfs/", "ipfs/");
        
        document.getElementById('nftImage').src = imgUrl;
        document.getElementById('nftLink').href = `https://opensea.io/assets/matic/${CONTRACT}/${tid}`;
        document.getElementById('nftTitle').innerText = data.name || `CryptoGoros #${tid}`;
        document.getElementById('nftDescription').innerText = data.description || (data.raw?.metadata?.description) || "説明なし";

        // --- 2. 所有者・Traitsを表示 ---
        // (省略せずに以前のコードのロジックをそのまま実行)
        const ownerUrl = `https://polygon-mainnet.g.alchemy.com/nft/v3/${API_KEY}/getOwnersForNFT?contractAddress=${CONTRACT}&tokenId=${tid}`;
        const oRes = await fetch(ownerUrl);
        const oData = await oRes.json();
        const currentOwner = oData.owners?.[0];
        const ownerLink = document.getElementById('nftOwnerLink');
        if (currentOwner) {
            ownerLink.innerText = currentOwner;
            ownerLink.href = `https://opensea.io/${currentOwner}?search[collections][0]=cryptogoros&collectionSlugs=cryptogoros`;
        }

        const traitsContainer = document.getElementById('nftTraits');
        traitsContainer.innerHTML = ""; 
        const attributes = data.raw?.metadata?.attributes || data.attributes;
        const slug = "cryptogoros"; 
        if (attributes && Array.isArray(attributes)) {
            attributes.forEach(attr => {
                const traitFilter = [{ traitType: attr.trait_type, values: [attr.value] }];
                const encodedFilter = encodeURIComponent(JSON.stringify(traitFilter));
                const traitUrl = `https://opensea.io/collection/${slug}?traits=${encodedFilter}`;
                const traitLink = document.createElement('a');
                traitLink.href = traitUrl;
                traitLink.target = "_blank";
                traitLink.style.cssText = "text-decoration:none; color:inherit; flex:1 1 calc(33.333% - 8px); min-width:100px;";
                traitLink.innerHTML = `<div style="background:#FFF5EE; border:1px solid #FFE0C0; border-radius:8px; padding:10px 5px; text-align:center;">
                    <div style="font-size:10px; color:#CC5500; font-weight:bold;">${attr.trait_type}</div>
                    <div style="font-size:13px; font-weight:bold;">${attr.value}</div>
                </div>`;
                traitsContainer.appendChild(traitLink);
            });
        }

        // ✨ ここで一旦画面を表示してしまう！ ✨
        resultDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerText = "表示する";

        // --- 3. 履歴取得（ここからは裏側でゆっくり実行） ---
        const historyUrl = `https://polygon-mainnet.g.alchemy.com/v2/${API_KEY}`;
        let allTransfers = [];
        let pageKey = null;

        async function fetchAllPages() {
            const params = {
                fromBlock: "0x0", toBlock: "latest", contractAddresses: [CONTRACT],
                category: ["erc721"], excludeZeroValue: false, maxCount: "0x3e8", withMetadata: true
            };
            if (pageKey) params.pageKey = pageKey;

            const res = await fetch(historyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: 1, jsonrpc: "2.0", method: "alchemy_getAssetTransfers", params: [params] })
            }).then(r => r.json());

            if (res.result && res.result.transfers) {
                allTransfers = allTransfers.concat(res.result.transfers);
                if (res.result.pageKey) {
                    pageKey = res.result.pageKey;
                    await fetchAllPages(); 
                }
            }
        }

        await fetchAllPages();

        const filtered = allTransfers.filter(tx => {
            return tx.tokenId && parseInt(tx.tokenId, 16) === parseInt(tid);
        }).reverse();

        hBody.innerHTML = ""; 
        if (filtered.length === 0) {
            hBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px; color:#999;'>履歴なし</td></tr>";
        } else {
            filtered.forEach(tx => {
                let dateStr = "-";
                if (tx.metadata && tx.metadata.blockTimestamp) {
                    const d = new Date(tx.metadata.blockTimestamp);
                    dateStr = `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                }
                hBody.innerHTML += `
                    <tr style="border-bottom: 1px solid #FFE0C0;">
                        <td style="padding: 10px; font-size: 11px;">
                            <span style="color:#999;">From:</span> ${tx.from.slice(0,6)}...<br>
                            <span style="color:#999;">To:</span> ${tx.to.slice(0,6)}...
                        </td>
                        <td style="padding: 10px; text-align: center; color: #666; font-size: 11px; white-space: nowrap;">
                            ${dateStr}
                        </td>
                        <td style="padding: 10px; text-align: center;">
                            <a href="https://polygonscan.com/tx/${tx.hash}" target="_blank" style="text-decoration:none;">📄</a>
                        </td>
                    </tr>`;
            });
        }

    } catch (e) {
        console.error("Error:", e);
        btn.disabled = false;
        btn.innerText = "表示する";
    }
};

</script>
</body>
</html>
