<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoGoros Explorer</title>
    <style>
        :root { --goros-orange: #FF6600; --bg-color: #FFF5EE; }
        body { font-family: sans-serif; background: var(--bg-color); padding: 40px 20px; color: #333; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,102,0,0.1); }
        h1 { color: var(--goros-orange); text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px; border: 2px solid #FFE0C0; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--goros-orange); }
        button { padding: 12px 24px; background: var(--goros-orange); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #result { display: none; border-top: 2px solid #FFE0C0; padding-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 画像リンク */
        #nftLink { display: block; width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        #nftLink:hover { transform: scale(1.01); box-shadow: 0 8px 25px rgba(255,102,0,0.2); }
        .nft-img { width: 100%; display: block; }
        
        .info-group { margin-bottom: 20px; }
        .info-label { font-size: 12px; color: #CC5500; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .info-value { font-size: 16px; word-break: break-all; line-height: 1.5; }
        
        /* オーナーリンク */
        #nftOwnerLink { color: var(--goros-orange); text-decoration: underline; font-weight: bold; }
        #nftOwnerLink:hover { color: #cc5500; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>CryptoGoros</h1>
    <div class="search-box">
    <input type="number" id="tokenId" placeholder="IDを入力" value="1" min="1" max="2000">
    
    <button id="fetchBtn">表示する</button>
    </div>

    <div id="result">
        <a id="nftLink" href="#" target="_blank">
        <div id="mediaContainer" style="..."></div>
        </a>

        <div class="info-group">
            <div class="info-label">Name</div>
            <div id="nftTitle" class="info-value" style="font-weight: bold; font-size: 20px;"></div>
        </div>

        <div class="info-group">
            <div class="info-label">Owner (Click to see their CryptoGoro collection)</div>
            <div class="info-value">
                <a id="nftOwnerLink" href="#" target="_blank"></a>
            </div>
        </div>

        <div class="info-group">
            <div class="info-label">Description</div>
            <div id="nftDescription" class="info-value" style="color: #555; font-size: 14px;"></div>
        </div>

        
        <div class="info-group">
    <div class="info-label">Traits</div>
    <div id="nftTraits" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; cursor: pointer;">
</div>

</div>
        <div class="info-group">
    <div class="info-label">Transfer History</div>
    <table id="historyTable" style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px;">
        <thead>
            <tr style="border-bottom: 2px solid #FFE0C0; text-align: left; color: #CC5500;">
                <th style="padding: 8px;">From</th>
                <th style="padding: 8px;">To</th>
                <th style="padding: 8px;">TX</th>
            </tr>
        </thead>
        <tbody id="hBody">
            </tbody>
    </table>
</div>
    </div>
</div>
<script>
const API_KEY = "xsfAkUztgC2QOCiy0ElXe"; 
const CONTRACT = "0x6C621364993E5CD4C6468930d287ba76Ef64F366";

document.getElementById('fetchBtn').onclick = async function() {
    document.getElementById('fetchBtn').onclick = async function() {
    let tid = document.getElementById('tokenId').value;
    const btn = this;
    const resultDiv = document.getElementById('result');
    const hBody = document.getElementById('hBody');
    const mediaContainer = document.getElementById('mediaContainer');
    
    // 💡 追加：IDの範囲チェック
    const idNum = parseInt(tid);
    if (!tid || idNum < 1 || idNum > 2000) {
        alert("トークンIDは 1 から 2000 の間で入力してください。");
        return;
    }

    btn.disabled = true;
    // ...（以下、これまでのコードが続く）
    const tid = document.getElementById('tokenId').value;
    const btn = this;
    const resultDiv = document.getElementById('result');
    const hBody = document.getElementById('hBody');
    const mediaContainer = document.getElementById('mediaContainer');
    
    if (!tid) return;

    btn.disabled = true;
    btn.innerText = "取得中...";
    resultDiv.style.display = 'none';
    hBody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:10px;'>履歴をスキャン中...</td></tr>";

    try {
        const nftUrl = `https://polygon-mainnet.g.alchemy.com/nft/v3/${API_KEY}/getNFTMetadata?contractAddress=${CONTRACT}&tokenId=${tid}&refreshCache=true`;
        const nftRes = await fetch(nftUrl);
        const data = await nftRes.json();

        mediaContainer.innerHTML = ""; 
        const meta = data.raw?.metadata || {};
        
        // --- 💡 修正ポイント：ArweaveとIPFSの両方に対応 ---
        const formatUrl = (u) => {
            if (!u) return "";
            if (u.startsWith("ipfs://")) return u.replace("ipfs://", "https://ipfs.io/ipfs/").replace("ipfs/ipfs/", "ipfs/");
            // Arweaveリンクはそのままでも通りますが、もし ar:// 形式なら変換
            if (u.startsWith("ar://")) return u.replace("ar://", "https://arweave.net/");
            return u;
        };

        const fImg = formatUrl(meta.image || meta.Image || data.image?.rawUrl || "");
        const fAnim = formatUrl(meta.animation_url || "");

        // OpenSeaのキャッシュ画像をバックアップ用に生成
        const osCache = `https://api.opensea.io/api/v1/asset/${CONTRACT}/${tid}/image?w=600`;

        // 💡 判定：ArweaveのURLやanimation_url、または拡張子がmp4なら動画
        const isVid = fAnim !== "" || fImg.includes("arweave.net") || fImg.toLowerCase().endsWith(".mp4");

        if (isVid) {
            const videoSrc = fAnim || fImg;
            mediaContainer.innerHTML = `
                <video src="${videoSrc}" autoplay loop muted playsinline controls 
                       style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;"
                       onerror="this.outerHTML='<img src=\'${osCache}\' style=\'width:100%;height:100%;object-fit:cover;border-radius:12px;\'>'">
                </video>`;
        } else {
            mediaContainer.innerHTML = `
                <img src="${fImg}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;" 
                     onerror="this.src='${osCache}'">`;
        }

        // --- 基本情報の反映 ---
        document.getElementById('nftLink').href = `https://opensea.io/assets/matic/${CONTRACT}/${tid}`;
        document.getElementById('nftTitle').innerText = data.name || `CryptoGoros #${tid}`;
        document.getElementById('nftDescription').innerText = data.description || meta.description || "説明なし";

        // 所有者情報 (非同期)
        fetch(`https://polygon-mainnet.g.alchemy.com/nft/v3/${API_KEY}/getOwnersForNFT?contractAddress=${CONTRACT}&tokenId=${tid}`)
            .then(r => r.json()).then(o => {
                const own = o.owners?.[0];
                if (own) {
                    document.getElementById('nftOwnerLink').innerText = own;
                    document.getElementById('nftOwnerLink').href = `https://opensea.io/${own}?search[collections][0]=cryptogoros&collectionSlugs=cryptogoros`;
                }
            });

        // Traits表示
        const traitsContainer = document.getElementById('nftTraits');
        traitsContainer.innerHTML = ""; 
        const attrs = meta.attributes || data.attributes;
        if (attrs && Array.isArray(attrs)) {
            attrs.forEach(a => {
                const url = `https://opensea.io/collection/cryptogoros?traits=${encodeURIComponent(JSON.stringify([{traitType:a.trait_type, values:[a.value]}]))}`;
                traitsContainer.innerHTML += `<a href="${url}" target="_blank" style="text-decoration:none; color:inherit; flex:1 1 calc(33.333% - 8px); min-width:100px;"><div style="background:#FFF5EE; border:1px solid #FFE0C0; border-radius:8px; padding:10px 5px; text-align:center;"><div style="font-size:10px; color:#CC5500; font-weight:bold;">${a.trait_type}</div><div style="font-size:13px; font-weight:bold;">${a.value}</div></div></a>`;
            });
        }

        resultDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerText = "表示する";

        // 履歴取得 (バックグラウンド)
        const histUrl = `https://polygon-mainnet.g.alchemy.com/v2/${API_KEY}`;
        let allT = [];
        let pKey = null;
        const getH = async () => {
            const p = { fromBlock:"0x0", toBlock:"latest", contractAddresses:[CONTRACT], category:["erc721"], excludeZeroValue:false, maxCount:"0x3e8", withMetadata:true };
            if (pKey) p.pageKey = pKey;
            const r = await fetch(histUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:1, jsonrpc:"2.0", method:"alchemy_getAssetTransfers", params:[p]}) }).then(res => res.json());
            if (r.result?.transfers) {
                allT = allT.concat(r.result.transfers);
                if (r.result.pageKey) { pKey = r.result.pageKey; await getH(); }
            }
        };
        getH().then(() => {
            const fil = allT.filter(x => x.tokenId && parseInt(x.tokenId, 16) === parseInt(tid)).reverse();
            hBody.innerHTML = fil.length ? "" : "<tr><td colspan='3' style='text-align:center; padding:20px; color:#999;'>履歴なし</td></tr>";
            fil.forEach(x => {
                let dStr = "-";
                if (x.metadata?.blockTimestamp) {
                    const d = new Date(x.metadata.blockTimestamp);
                    dStr = `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                }
                hBody.innerHTML += `<tr style="border-bottom:1px solid #FFE0C0;"><td style="padding:10px; font-size:11px;"><span style="color:#999;">From:</span> ${x.from.slice(0,6)}...<br><span style="color:#999;">To:</span> ${x.to.slice(0,6)}...</td><td style="padding:10px; text-align:center; color:#666; font-size:11px;">${dStr}</td><td style="padding:10px; text-align:center;"><a href="https://polygonscan.com/tx/${x.hash}" target="_blank" style="text-decoration:none;">📄</a></td></tr>`;
            });
        });

    } catch (e) {
        console.error(e);
        btn.disabled = false;
        btn.innerText = "表示する";
    }
};
</script>
</body>
</html>
