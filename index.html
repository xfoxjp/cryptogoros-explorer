<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoGoros Explorer</title>
    <style>
        :root { --goros-orange: #FF6600; --bg-color: #FFF5EE; }
        body { font-family: sans-serif; background: var(--bg-color); padding: 20px; color: #333; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255,102,0,0.1); }
        h1 { color: var(--goros-orange); text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .search-box { display: flex; gap: 5px; margin-bottom: 25px; align-items: center; }
        input { flex: 1; padding: 12px; border: 2px solid #FFE0C0; border-radius: 10px; font-size: 16px; outline: none; text-align: center; }
        .btn-base { padding: 12px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--goros-orange); color: white; flex: 1.5; }
        .btn-nav { background: #eee; color: #333; flex: 0.5; }
        .btn-base:hover { opacity: 0.8; }
        #result { display: none; border-top: 2px solid #FFE0C0; padding-top: 20px; }
        #mediaContainer { width: 100%; aspect-ratio: 1/1; background: #eee; border-radius: 15px; overflow: hidden; position: relative; margin-bottom: 20px; }
        .media-wrapper { position: relative; width: 100%; height: 100%; }
        .full-link { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
        .partial-link { position: absolute; top: 0; left: 0; width: 100%; height: 85%; z-index: 10; cursor: pointer; }
        .info-label { font-size: 11px; color: #CC5500; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .info-value { font-size: 15px; margin-bottom: 15px; word-break: break-all; }
        #nftTraits { display: flex; flex-wrap: wrap; gap: 8px; }
        .trait-card { background:#FFF5EE; border:1px solid #FFE0C0; border-radius:8px; padding:8px; text-align:center; flex:1 1 calc(33% - 8px); text-decoration:none; color:inherit; font-size:11px; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 10px; }
        tr { border-bottom: 1px solid #eee; }
        td { padding: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>CryptoGoros</h1>
    <div class="search-box">
        <button id="prevBtn" class="btn-base btn-nav">◀</button>
        <input type="number" id="tokenId" value="1" min="1" max="2000">
        <button id="nextBtn" class="btn-base btn-nav">▶</button>
        <button id="fetchBtn" class="btn-base btn-main">表示</button>
    </div>

    <div id="result">
        <div id="mediaContainer"></div>
        <div class="info-label">Name</div>
        <div id="nftTitle" style="font-weight:bold; font-size:18px; margin-bottom:15px;"></div>
        <div class="info-label">Owner</div>
        <div class="info-value"><a id="nftOwnerLink" href="#" target="_blank" style="color:#FF6600; font-weight:bold; text-decoration:none;"></a></div>
        <div class="info-label">Traits</div>
        <div id="nftTraits"></div>
        <div class="info-label" style="margin-top:20px;">History</div>
        <table><tbody id="hBody"></tbody></table>
    </div>
</div>

<script>
const API_KEY = "xsfAkUztgC2QOCiy0ElXe"; 
const CONTRACT = "0x6C621364993E5CD4C6468930d287ba76Ef64F366";
let currentRequestId = 0;
const VIDEO_IDS = [1660, 1640, 1635, 1626, 1620, 1646];

window.onload = function() {
    const fetchBtn = document.getElementById('fetchBtn');
    const input = document.getElementById('tokenId');

    const trigger = (delta) => {
        let v = parseInt(input.value) + delta;
        if (v >= 1 && v <= 2000) { input.value = v; executeFetch(v); }
    };
    document.getElementById('prevBtn').onclick = () => trigger(-1);
    document.getElementById('nextBtn').onclick = () => trigger(1);
    fetchBtn.onclick = () => executeFetch(parseInt(input.value));

    async function executeFetch(tid) {
        if (isNaN(tid) || tid < 1 || tid > 2000) return;
        const requestId = ++currentRequestId;
        const resultDiv = document.getElementById('result');
        const media = document.getElementById('mediaContainer');
        const hBody = document.getElementById('hBody');

        fetchBtn.disabled = true;
        fetchBtn.innerText = "読込中...";
        resultDiv.style.display = 'none';
        media.innerHTML = "";
        hBody.innerHTML = "<tr><td>データを同期中...</td></tr>";

        try {
            const nftUrl = `https://polygon-mainnet.g.alchemy.com/nft/v3/${API_KEY}/getNFTMetadata?contractAddress=${CONTRACT}&tokenId=${tid}&refreshCache=true`;
            const nftRes = await fetch(nftUrl);
            const data = await nftRes.json();

            if (requestId !== currentRequestId) return;

            const meta = data.raw?.metadata || {};
            const osLink = `https://opensea.io/assets/matic/${CONTRACT}/${tid}`;
            
            // 1. まずは通常のルールでURLを決める
// --- 判定ロジック部分を以下に差し替え ---
            let osImg = `https://api.opensea.io/api/v1/asset/${CONTRACT}/${tid}/image?w=600`;
            let fMedia = (meta.animation_url || meta.image || "").replace("ipfs://", "https://ipfs.io/ipfs/").replace("ar://", "https://arweave.net/");

            if (tid === 1625) {
                osImg = "https://arweave.net/MSQ8bKLDZtgGxMIq4HoouWzYcduSaVJrdQruWHuO8Lw";
                fMedia = osImg;
            } else if (tid === 1731) {
                // ここを提示されたURLに固定
                osImg = "https://i2c.seadn.io/polygon/0x6c621364993e5cd4c6468930d287ba76ef64f366/a7fdbee22be8fbdda1605626124c19/92a7fdbee22be8fbdda1605626124c19.png?w=1000";
                fMedia = osImg;
            }

            const wrapper = document.createElement('div');
            wrapper.className = "media-wrapper";
            const linkA = document.createElement('a');
            linkA.href = osLink;
            linkA.target = "_blank";

            if (VIDEO_IDS.includes(tid)) {
                linkA.className = "partial-link";
                wrapper.innerHTML = `<video src="${fMedia}" autoplay loop muted playsinline controls style="width:100%;height:100%;object-fit:cover;border-radius:15px;"></video>`;
            } else {
                linkA.className = "full-link";
                // 💡 修正ポイント: referrerPolicy="no-referrer" を追加し、onerrorの無限ループを防ぐ
                wrapper.innerHTML = `<img src="${osImg}" 
                    referrerPolicy="no-referrer" 
                    style="width:100%;height:100%;object-fit:cover;border-radius:15px;" 
                    onerror="if(this.src != '${fMedia}') this.src='${fMedia}';">`;
            }
            
            wrapper.appendChild(linkA);
            media.appendChild(wrapper);

            document.getElementById('nftTitle').innerText = `CryptoGoro #${tid}`;

            fetch(`https://polygon-mainnet.g.alchemy.com/nft/v3/${API_KEY}/getOwnersForNFT?contractAddress=${CONTRACT}&tokenId=${tid}`)
                .then(r => r.json()).then(o => {
                    if (requestId === currentRequestId && o.owners) {
                        const own = o.owners[0];
                        const l = document.getElementById('nftOwnerLink');
                        l.innerText = own.slice(0,6) + "..." + own.slice(-4);
                        l.href = `https://opensea.io/${own}?search[query]=cryptogoros&collectionSlugs=cryptogoros`;
                    }
                });

            const traits = document.getElementById('nftTraits');
            traits.innerHTML = "";
            const attrs = meta.attributes || data.attributes;
            if (attrs && Array.isArray(attrs)) {
                attrs.forEach(a => {
                    const url = "https://opensea.io/collection/cryptogoros?traits=" + encodeURIComponent(JSON.stringify([{traitType:a.trait_type, values:[a.value]}]));
                    traits.innerHTML += `<a href="${url}" target="_blank" class="trait-card"><b>${a.trait_type}</b><br>${a.value}</a>`;
                });
            }

            resultDiv.style.display = 'block';

            const histUrl = `https://polygon-mainnet.g.alchemy.com/v2/${API_KEY}`;
            let allT = [];
            let pKey = null;

            async function scan() {
                if (requestId !== currentRequestId) return;
                const body = { id: 1, jsonrpc: "2.0", method: "alchemy_getAssetTransfers", params: [{ fromBlock: "0x0", toBlock: "latest", contractAddresses: [CONTRACT], category: ["erc721"], withMetadata: true, maxCount: "0x3e8" }] };
                if (pKey) body.params[0].pageKey = pKey;
                const res = await fetch(histUrl, { method: 'POST', body: JSON.stringify(body) }).then(r => r.json());
                if (res.result && res.result.transfers) {
                    const matched = res.result.transfers.filter(tx => {
                        const txId = tx.tokenId.startsWith("0x") ? parseInt(tx.tokenId, 16) : parseInt(tx.tokenId);
                        return txId === tid;
                    });
                    allT = allT.concat(matched);
                    if (res.result.pageKey) { pKey = res.result.pageKey; await scan(); } else { render(allT); }
                }
            }
            function render(list) {
                if (requestId !== currentRequestId) return;
                list.sort((a, b) => b.metadata.blockTimestamp.localeCompare(a.metadata.blockTimestamp));
                hBody.innerHTML = list.length ? "" : "<tr><td>履歴なし</td></tr>";
                list.forEach(tx => {
                    const d = tx.metadata?.blockTimestamp ? new Date(tx.metadata.blockTimestamp).toLocaleDateString() : "-";
                    const from = tx.from.startsWith("0x0000") ? "Mint" : tx.from.slice(0,6) + "...";
                    hBody.innerHTML += `<tr><td style="padding:10px 0;"><span style="color:#999; font-size:10px;">From: ${from}</span><br>To: ${tx.to.slice(0,6)}...</td><td style="text-align:right; color:#888; vertical-align:middle;">${d}</td><td style="text-align:right; vertical-align:middle;"><a href="https://polygonscan.com/tx/${tx.hash}" target="_blank" style="text-decoration:none;">📄</a></td></tr>`;
                });
            }
            scan();
        } catch (e) { console.error(e); } finally { if (requestId === currentRequestId) { fetchBtn.disabled = false; fetchBtn.innerText = "表示"; } }
    }
};
</script>
</body>
</html>
